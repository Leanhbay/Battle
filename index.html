<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CR7 Web Game</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #87CEEB; }
        #loading {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-family: Arial, sans-serif; font-size: 24px; color: white;
            background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px;
        }
        #instructions {
            position: absolute; top: 10px; left: 10px;
            font-family: Arial, sans-serif; color: white;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="loading">Đang tải mô hình và hoạt ảnh (Có thể mất một lúc do load từ link)... 0%</div>
    <div id="instructions">
        <strong>Điều khiển:</strong><br>
        W / A / S / D : Di chuyển<br>
        Shift + W: Chạy<br>
        Space: Nhảy
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.module.js';
        import { FBXLoader } from 'https://cdn.jsdelivr.net/npm/three@0.128.0/examples/jsm/loaders/FBXLoader.js';

        // 1. CHUYỂN ĐỔI LINK GITHUB SANG LINK RAW
        const BASE_URL = "https://raw.githubusercontent.com/Leanhbay/Minecraft/main/";
        const urls = {
            model: BASE_URL + "3d-rigged-cristiano-ronaldo-al-nassr.fbx",
            idle: BASE_URL + "Idle.fbx",
            walk: BASE_URL + "Swagger%20Walk.fbx",
            run: BASE_URL + "Running.fbx",
            jump: BASE_URL + "Jumping.fbx",
            walkRight: BASE_URL + "r%E1%BA%BD%20ph%E1%BA%A3i.fbx",
            walkLeft: BASE_URL + "r%E1%BA%BD%20sang%20tr%C3%A1i.fbx",
            walkJump: BASE_URL + "nh%E1%BA%A3y%20khi%20%C4%91i%20b%E1%BB%99.fbx",
            runRight: BASE_URL + "ch%E1%BA%A1y%20r%E1%BA%BD%20ph%E1%BA%A3i.fbx",
            runLeft: BASE_URL + "r%E1%BA%BD%20tr%C3%A1i%20khi%20ch%E1%BA%A1y.fbx",
            runJump: BASE_URL + "nh%E1%BA%A3y%20khi%20ch%E1%BA%A1y.fbx"
        };

        // 2. KHỞI TẠO KHÔNG GIAN GAME (SCENE)
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x87CEEB, 0.002);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 2000);
        camera.position.set(0, 200, 400);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // Ánh sáng
        const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444);
        hemiLight.position.set(0, 200, 0);
        scene.add(hemiLight);
        const dirLight = new THREE.DirectionalLight(0xffffff);
        dirLight.position.set(0, 200, 100);
        dirLight.castShadow = true;
        scene.add(dirLight);

        // Mặt đất
        const mesh = new THREE.Mesh(
            new THREE.PlaneGeometry(2000, 2000),
            new THREE.MeshPhongMaterial({ color: 0x999999, depthWrite: false })
        );
        mesh.rotation.x = -Math.PI / 2;
        mesh.receiveShadow = true;
        scene.add(mesh);

        // 3. TẢI MÔ HÌNH VÀ HOẠT ẢNH
        const loader = new FBXLoader();
        let mixer, character;
        const actions = {};
        let currentAction;
        let loadedCount = 0;
        const totalFiles = Object.keys(urls).length;

        const updateLoading = () => {
            loadedCount++;
            document.getElementById('loading').innerText = `Đang tải: ${Math.round((loadedCount / totalFiles) * 100)}%`;
            if (loadedCount === totalFiles) {
                document.getElementById('loading').style.display = 'none';
            }
        };

        // Tải nhân vật chính
        loader.load(urls.model, (object) => {
            character = object;
            mixer = new THREE.AnimationMixer(character);
            
            // Xử lý bóng đổ
            character.traverse((child) => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                }
            });
            
            // Chỉnh kích thước nhân vật cho phù hợp
            character.scale.set(0.5, 0.5, 0.5); 
            scene.add(character);
            updateLoading();

            // Hàm tải các hoạt ảnh đính kèm vào nhân vật
            const loadAnimation = (key, url) => {
                loader.load(url, (animObj) => {
                    if(animObj.animations.length > 0) {
                        const action = mixer.clipAction(animObj.animations[0]);
                        actions[key] = action;
                    }
                    updateLoading();
                    
                    // Nếu đã tải xong tất cả, bắt đầu bằng Idle
                    if(loadedCount === totalFiles) {
                        currentAction = actions['idle'];
                        if(currentAction) currentAction.play();
                    }
                });
            };

            // Tải từng hoạt ảnh
            loadAnimation('idle', urls.idle);
            loadAnimation('walk', urls.walk);
            loadAnimation('run', urls.run);
            loadAnimation('jump', urls.jump);
            loadAnimation('walkRight', urls.walkRight);
            loadAnimation('walkLeft', urls.walkLeft);
            loadAnimation('walkJump', urls.walkJump);
            loadAnimation('runRight', urls.runRight);
            loadAnimation('runLeft', urls.runLeft);
            loadAnimation('runJump', urls.runJump);

        });

        // 4. HỆ THỐNG ĐIỀU KHIỂN & CHUYỂN ĐỔI HOẠT ẢNH
        const keys = { w: false, a: false, s: false, d: false, shift: false, space: false };

        window.addEventListener('keydown', (e) => {
            if(e.key.toLowerCase() === 'w') keys.w = true;
            if(e.key.toLowerCase() === 'a') keys.a = true;
            if(e.key.toLowerCase() === 'd') keys.d = true;
            if(e.key === 'Shift') keys.shift = true;
            if(e.key === ' ') keys.space = true;
            updateAnimation();
        });

        window.addEventListener('keyup', (e) => {
            if(e.key.toLowerCase() === 'w') keys.w = false;
            if(e.key.toLowerCase() === 'a') keys.a = false;
            if(e.key.toLowerCase() === 'd') keys.d = false;
            if(e.key === 'Shift') keys.shift = false;
            if(e.key === ' ') keys.space = false;
            updateAnimation();
        });

        // Hàm chuyển đổi hoạt ảnh mượt mà
        function playAction(name) {
            const nextAction = actions[name];
            if (!nextAction || currentAction === nextAction) return;
            nextAction.reset().fadeIn(0.2).play();
            if (currentAction) currentAction.fadeOut(0.2);
            currentAction = nextAction;
        }

        // Logic xác định trạng thái nhân vật
        function updateAnimation() {
            if (!mixer) return;

            if (keys.space) {
                if (keys.w && keys.shift) playAction('runJump');
                else if (keys.w) playAction('walkJump');
                else playAction('jump');
            } else if (keys.w) {
                if (keys.shift) {
                    if (keys.d) playAction('runRight');
                    else if (keys.a) playAction('runLeft');
                    else playAction('run');
                } else {
                    if (keys.d) playAction('walkRight');
                    else if (keys.a) playAction('walkLeft');
                    else playAction('walk');
                }
            } else {
                playAction('idle');
            }
        }

        // 5. VÒNG LẶP RENDER GAME
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }
        animate();

        // Xử lý khi đổi kích thước cửa sổ
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
