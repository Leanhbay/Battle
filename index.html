<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BATTLE ROYALE 2.5D - Mobile & Realistic</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-layer">
        <h1>BATTLE ROYALE 2.5D</h1>
        <p>Trạng thái: <span id="statusText" style="color: #00FF00;">Đang nhảy dù...</span></p>
        <p>Điểm: <span id="scoreText">0</span> | HP: <span id="hpText">100</span></p>
    </div>

    <div id="controls">
        <strong>PC:</strong> W,A,S,D di chuyển | Chuột ngắm & Bắn | Phím F đóng/mở cửa.<br>
        <strong>Mobile:</strong> Dùng Joystick, Nút Bắn & Nút Mở Cửa.
    </div>
    
    <div class="blood-overlay" id="blood"></div>

    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    <div id="shoot-btn">BẮN</div>
    <div id="interact-btn">MỞ</div>

    <canvas id="gameCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
